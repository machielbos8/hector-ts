stages:
  - build

cache:
  key: vcpkg-windows-$CI_COMMIT_REF_SLUG
  policy: pull-push
  paths:
    - vcpkg/
    - vcpkg_cache/

build_windows_wheels:
  stage: build
  tags:
    - saas-windows-medium-amd64
  rules:
    - if: $CI_COMMIT_TAG
    - when: manual
  variables:
    CIBW_BUILD: "cp310-win_amd64 cp311-win_amd64 cp312-win_amd64 cp313-win_amd64"
    CIBW_ARCHS_WINDOWS: "AMD64"
  script:
    - py -m pip install --upgrade pip
    - py -m pip install cibuildwheel delvewheel
    - |
      $ErrorActionPreference = "Stop"
      $env:VCPKG_ROOT = Join-Path $env:CI_PROJECT_DIR "vcpkg"
      $env:FFTW_ROOT  = Join-Path $env:VCPKG_ROOT "installed\x64-windows"
      $env:VCPKG_BINARY_SOURCES = "clear;files,$env:CI_PROJECT_DIR\vcpkg_cache,readwrite"

      if (!(Test-Path $env:VCPKG_ROOT)) {
        git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
      }
      & (Join-Path $env:VCPKG_ROOT "bootstrap-vcpkg.bat")
      & (Join-Path $env:VCPKG_ROOT "vcpkg.exe") install fftw3:x64-windows

      # FFTW_DIR points to the vcpkg prefix root; setup.py auto-detects
      # prefix/include/fftw3.h and prefix/lib/fftw3.lib from there.
      $env:CIBW_ENVIRONMENT_WINDOWS = "FFTW_DIR='$($env:FFTW_ROOT)'"

      # FFTW_BIN_DIR is read by pyproject.toml's repair-wheel-command so that
      # delvewheel can find fftw3.dll and bundle it into the wheel.
      $env:FFTW_BIN_DIR = "$($env:FFTW_ROOT)\bin"
      $env:PATH = "$($env:FFTW_ROOT)\bin;$($env:PATH)"

      py -m cibuildwheel --platform windows --output-dir wheelhouse
  artifacts:
    paths:
      - wheelhouse/*.whl
    expire_in: 1 week
